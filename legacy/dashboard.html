<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Hydroponics Control Dashboard</title>
  <style>
    :root {
      --bg: #f4f1ea;
      --panel: #fffdf8;
      --line: #d9d0c2;
      --text: #1f2a2d;
      --muted: #6f7c80;
      --accent: #0f766e;
      --warn: #b45309;
      --bad: #b91c1c;
      --good: #166534;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: linear-gradient(180deg, #efe7da 0%, var(--bg) 100%);
      color: var(--text);
      font: 14px/1.4 Consolas, "Courier New", monospace;
    }
    .page {
      display: grid;
      grid-template-columns: 1.05fr 1.25fr;
      gap: 16px;
      min-height: 100vh;
      padding: 16px;
    }
    .panel {
      background: rgba(255, 253, 248, 0.96);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 16px;
      box-shadow: 0 12px 30px rgba(57, 44, 18, 0.08);
    }
    h1, h2, h3, p { margin: 0; }
    h1 { font-size: 18px; margin-bottom: 14px; }
    h2 { font-size: 15px; margin-bottom: 10px; }
    .subtle { color: var(--muted); }
    .header-row, .pill-row, .metric-grid { display: grid; gap: 10px; }
    .header-row { grid-template-columns: repeat(3, minmax(0, 1fr)); margin-bottom: 16px; }
    .metric-grid { grid-template-columns: repeat(3, minmax(0, 1fr)); margin-bottom: 16px; }
    .card {
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 12px;
      background: #fffaf1;
    }
    .metric-value { font-size: 26px; font-weight: 700; margin-top: 8px; }
    .pill-row { grid-template-columns: repeat(2, minmax(0, 1fr)); margin-bottom: 16px; }
    .pill {
      padding: 10px 12px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: #fff;
    }
    .ready { color: var(--good); }
    .warn { color: var(--warn); }
    .bad { color: var(--bad); }
    .list {
      display: grid;
      gap: 8px;
      max-height: calc(100vh - 120px);
      overflow: auto;
      padding-right: 4px;
    }
    .event {
      border: 1px solid var(--line);
      border-left: 4px solid var(--accent);
      background: #fff;
      border-radius: 10px;
      padding: 10px 12px;
    }
    .event.fail { border-left-color: var(--bad); }
    .event.warn { border-left-color: var(--warn); }
    .event.ok { border-left-color: var(--good); }
    .tiny { font-size: 12px; color: var(--muted); }
    .section { margin-top: 14px; }
    .mono-wrap { white-space: pre-wrap; word-break: break-word; }
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 14px;
    }
    .bundle-btn {
      appearance: none;
      border: 1px solid var(--accent);
      background: var(--accent);
      color: #fffdf8;
      border-radius: 10px;
      padding: 10px 14px;
      font: inherit;
      cursor: pointer;
    }
    .bundle-btn:hover {
      filter: brightness(0.95);
    }
    @media (max-width: 980px) {
      .page { grid-template-columns: 1fr; }
      .list { max-height: none; }
      .metric-grid, .header-row, .pill-row { grid-template-columns: 1fr; }
      .topbar { flex-direction: column; align-items: stretch; }
    }
  </style>
</head>
<body>
  <div class="page">
    <section class="panel">
      <div class="topbar">
        <h1>Live Telemetry And System State</h1>
        <button id="downloadBundle" class="bundle-btn" type="button">Download Full Diagnostic Bundle</button>
      </div>
      <div class="header-row">
        <div class="card"><div class="subtle">Profile</div><div id="profile" class="metric-value">-</div></div>
        <div class="card"><div class="subtle">Dry Run</div><div id="dryRun" class="metric-value">-</div></div>
        <div class="card"><div class="subtle">Readiness</div><div id="readiness" class="metric-value">-</div></div>
      </div>
      <div class="metric-grid">
        <div class="card"><div class="subtle">pH</div><div id="ph" class="metric-value">-</div><div id="phMeta" class="tiny"></div></div>
        <div class="card"><div class="subtle">EC</div><div id="ec" class="metric-value">-</div><div id="ecMeta" class="tiny"></div></div>
        <div class="card"><div class="subtle">Water Level</div><div id="water_level" class="metric-value">-</div><div id="waterLevelMeta" class="tiny"></div></div>
      </div>
      <div class="pill-row">
        <div id="freshness" class="pill">Telemetry completeness: -</div>
        <div id="updatedAt" class="pill">Updated: -</div>
      </div>
      <div class="section">
        <h2>Telemetry Completeness</h2>
        <div id="completeness" class="mono-wrap tiny">-</div>
      </div>
      <div class="section">
        <h2>Risks</h2>
        <div id="risks" class="mono-wrap tiny">-</div>
      </div>
    </section>
    <section class="panel">
      <h1>Live Decision And Event Stream</h1>
      <div id="events" class="list"></div>
    </section>
  </div>
  <script>
    const fmtTs = (ts) => ts ? new Date(ts * 1000).toLocaleTimeString() : "-";
    const fmtVal = (value, digits = 2) => value === null || value === undefined ? "-" : Number(value).toFixed(digits);
    const classForReadiness = (state) => {
      if (state === "ready_for_actuation" || state === "ready_for_observation") return "ready";
      if (state === "degraded") return "bad";
      return "warn";
    };
    const classForEvent = (status = "", eventType = "") => {
      const key = `${eventType}:${status}`.toLowerCase();
      if (key.includes("failed") || key.includes("timeout")) return "fail";
      if (key.includes("escalation") || key.includes("rejected") || key.includes("unavailable")) return "warn";
      if (key.includes("done") || key.includes("called") || key.includes("received")) return "ok";
      return "";
    };

    async function loadStatus() {
      const res = await fetch("/api/status", { cache: "no-store" });
      const data = await res.json();
      const telemetry = data.telemetry || {};
      const readiness = (data.readiness || {}).state || "-";
      document.getElementById("profile").textContent = data.profile || "-";
      document.getElementById("dryRun").textContent = data.dry_run ? "ON" : "OFF";
      const readinessEl = document.getElementById("readiness");
      readinessEl.textContent = readiness;
      readinessEl.className = `metric-value ${classForReadiness(readiness)}`;
      document.getElementById("ph").textContent = fmtVal(telemetry.ph?.last, 2);
      document.getElementById("ec").textContent = fmtVal(telemetry.ec?.last, 2);
      document.getElementById("water_level").textContent = telemetry.water_level?.last === null || telemetry.water_level?.last === undefined
        ? "-"
        : `${Number(telemetry.water_level.last).toFixed(1)}%`;
      document.getElementById("phMeta").textContent = `trend=${telemetry.ph?.trend || "-"} freshness=${data.telemetry_state?.sensors?.ph?.state || "-"}`;
      document.getElementById("ecMeta").textContent = `trend=${telemetry.ec?.trend || "-"} freshness=${data.telemetry_state?.sensors?.ec?.state || "-"}`;
      document.getElementById("waterLevelMeta").textContent = `trend=${telemetry.water_level?.trend || "-"} freshness=${data.telemetry_state?.sensors?.water_level?.state || "-"}`;
      document.getElementById("updatedAt").textContent = `Updated: ${fmtTs(data.updated_at)}`;
      const completeness = data.completeness || {};
      document.getElementById("freshness").textContent =
        `Telemetry completeness: minimum=${JSON.stringify(completeness.minimum_states || {})}`;
      document.getElementById("completeness").textContent = JSON.stringify(data.telemetry_state || {}, null, 2);
      document.getElementById("risks").textContent = (data.risks || []).length ? JSON.stringify(data.risks, null, 2) : "[]";
    }

    async function loadEvents() {
      const res = await fetch("/api/events?limit=80", { cache: "no-store" });
      const data = await res.json();
      const host = document.getElementById("events");
      host.innerHTML = "";
      for (const event of (data.events || [])) {
        const node = document.createElement("div");
        node.className = `event ${classForEvent(event.status, event.event_type)}`;
        const context = event.context ? `<div class="tiny mono-wrap">${JSON.stringify(event.context).slice(0, 400)}</div>` : "";
        node.innerHTML = `
          <div><strong>${event.event_type}</strong> <span class="subtle">(${fmtTs(event.ts)})</span></div>
          <div class="tiny">source=${event.source} metric=${event.metric || "-"} status=${event.status || "-"}</div>
          <div class="mono-wrap">${event.details || ""}</div>
          ${context}
        `;
        host.appendChild(node);
      }
    }

    async function refresh() {
      try {
        await Promise.all([loadStatus(), loadEvents()]);
      } catch (err) {
        console.error(err);
      }
    }

    document.getElementById("downloadBundle").addEventListener("click", () => {
      window.location.href = "/download/diagnostic-bundle";
    });

    refresh();
    setInterval(refresh, 2000);
  </script>
</body>
</html>
